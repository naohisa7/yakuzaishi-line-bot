<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬剤師用メニュー | かかりつけ薬剤師</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2F9E8F">
<link rel="icon" href="/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="かかりつけ薬剤師">
<style>
  .host-menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  a.host-menu-card {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  a.host-menu-card h3 {
    margin-bottom: 6px;
  }
  a.host-menu-card p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/guide">ご利用ガイド</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">お問い合わせ</a>
    <a href="/patient" class="nav-cta">患者様はこちら</a>
  </div>
</nav>

<div class="page-header">
  <span class="hero-deco deco-1" aria-hidden="true">🗂️</span>
  <span class="hero-deco deco-4" aria-hidden="true">💊</span>
  <h1 class="reveal">🗂️ 薬剤師用メニュー</h1>
  <p class="reveal delay-1">このページだけ覚えておけば大丈夫です</p>
</div>
<div class="page-wave">
  <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,45 350,-5 500,20 L500,40 L0,40 Z" fill="#F4F6F5"></path>
  </svg>
</div>

<div class="container" id="app-container">

  <section id="login-section" style="display:none">
    <div class="card">
      <div class="card-icon-circle lg c-purple">🔑</div>
      <h3>パスワードを入力してください</h3>
      <div class="error" id="login-error" style="display:none"></div>
      <label for="password-input">パスワード</label>
      <input type="password" id="password-input" placeholder="LINEで設定したパスワード">
      <button class="btn" id="login-button">ログイン</button>
    </div>
  </section>

  <section id="menu-content" style="display:none">
    <div class="host-menu-grid">
      <a href="/console" class="card tilt-card host-menu-card reveal-on-scroll reveal-up">
        <div class="card-icon-circle c-teal">💬</div>
        <h3>患者チャットコンソール</h3>
        <p>患者さんとのチャット・一斉送信・対応記録・服薬リマインダー</p>
      </a>
      <a href="/admin" class="card tilt-card host-menu-card reveal-on-scroll reveal-up">
        <div class="card-icon-circle c-amber">📝</div>
        <h3>記事管理</h3>
        <p>お薬の記事の追加・編集・削除</p>
      </a>
      <a href="/host-guide" class="card tilt-card host-menu-card reveal-on-scroll reveal-up">
        <div class="card-icon-circle c-sky">📖</div>
        <h3>薬剤師様用マニュアル</h3>
        <p>LINEコマンド一覧・各機能の使い方</p>
      </a>
    </div>
  </section>

</div>

<footer class="site-footer">
  <div class="footer-grid">
    <a href="/" class="nav-logo footer-brand"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
    <div class="footer-links">
      <a href="/articles">お薬の記事</a>
      <a href="/contact">お問い合わせ</a>
      <a href="/patient">患者様はこちら</a>
      <a href="/guide">ご利用ガイド</a>
    </div>
  </div>
  <div class="footer-note" data-copyright>© かかりつけ薬剤師</div>
</footer>

<script src="/js/site.js"></script>
<script src="/js/host.js"></script>
</body>
</html>
