<body>

<nav class="top-nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/profile">プロフィール</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">仕事のご依頼</a>
    <a href="/patient" class="nav-cta">患者様はこちら</a>
  </div>
</nav>

<div class="page-header">
  <span class="hero-deco deco-1" aria-hidden="true">📋</span>
  <span class="hero-deco deco-4" aria-hidden="true">💊</span>
  <span class="hero-deco deco-5" aria-hidden="true">🌿</span>
  <h1 class="reveal">📋 お薬手帳</h1>
  <p class="reveal delay-1">お飲みになっているお薬を登録・確認できます</p>
</div>
<div class="page-wave">
  <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,45 350,-5 500,20 L500,40 L0,40 Z" fill="#F4F6F5"></path>
  </svg>
</div>

<div class="container" style="padding-bottom:0;">
  <div class="card" id="pharmacist-name-banner" style="display:none; text-align:center;"></div>
</div>

<div class="container" id="register-section" style="display:none; padding-bottom:0;">
  <div class="card">
    <h3>➕ お薬を登録する</h3>
    <p class="drug-search-hint">お薬の名前を<strong>3文字以上</strong>入力すると候補が出ます。選んだあと、続けて次のお薬を検索できます。</p>

    <div class="drug-search-box">
      <input type="text" id="drug-search-input" placeholder="例：アムロジピン、たけきゃぶ" autocomplete="off">
      <div id="drug-search-status" class="drug-search-status"></div>
      <ul id="drug-search-results" class="drug-search-results" hidden></ul>
    </div>

    <div id="drug-pending" class="drug-pending" hidden>
      <h4>登録するお薬（<span id="drug-pending-count">0</span>件）</h4>
      <ul id="drug-pending-list" class="drug-pending-list"></ul>
      <button class="btn" id="drug-register-button">この内容で登録する</button>
    </div>
  </div>
</div>

<div class="container" id="medication-list">読み込み中...</div>

<footer class="site-footer">

</footer>
