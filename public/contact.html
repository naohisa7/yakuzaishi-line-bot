<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕事のご依頼 | かかりつけ薬剤師</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo">💊 かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/profile">プロフィール</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">仕事のご依頼</a>
    <a href="/patient" class="nav-cta">患者様はこちら</a>
  </div>
</nav>

<div class="page-header">
  <h1>💼 仕事のご依頼</h1>
  <p>講演・執筆・取材などのご依頼はこちらから</p>
</div>

<div class="container">
  <div class="card">
    <div class="error" id="contact-error" style="display:none"></div>
    <div id="contact-success" style="display:none">
      <p>お問い合わせありがとうございました。内容を確認のうえ、担当よりご連絡いたします。</p>
    </div>
    <form id="contact-form">
      <label for="contact-name">お名前・会社名</label>
      <input type="text" id="contact-name">
      <label for="contact-email">ご連絡先メールアドレス</label>
      <input type="text" id="contact-email">
      <label for="contact-message">ご依頼内容</label>
      <textarea id="contact-message" rows="6"></textarea>
      <button type="submit" class="btn">送信する</button>
    </form>
  </div>
</div>

<div class="footer-note">© かかりつけ薬剤師</div>

<script src="/js/contact.js"></script>
</body>
</html>
