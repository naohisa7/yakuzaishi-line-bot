<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕事のご依頼 | かかりつけ薬剤師</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2F9E8F">
<link rel="icon" href="/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="かかりつけ薬剤師">
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/profile">プロフィール</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">仕事のご依頼</a>
    <a href="/patient" class="nav-cta">患者様はこちら</a>
  </div>
</nav>

<div class="page-header">
  <span class="hero-deco deco-1" aria-hidden="true">💼</span>
  <span class="hero-deco deco-4" aria-hidden="true">✉️</span>
  <span class="hero-deco deco-5" aria-hidden="true">✚</span>
  <span class="hero-deco deco-6" aria-hidden="true">📎</span>
  <h1 class="reveal">💼 仕事のご依頼</h1>
  <p class="reveal delay-1">講演・執筆・取材などのご依頼はこちらから</p>
</div>
<div class="page-wave">
  <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,45 350,-5 500,20 L500,40 L0,40 Z" fill="#F4F6F5"></path>
  </svg>
</div>

<div class="trust-row">
  <span class="trust-badge trust-1 reveal-on-scroll reveal-up">📩 内容を確認しご連絡</span>
  <span class="trust-badge trust-2 reveal-on-scroll reveal-up">🔒 情報を厳重に管理</span>
  <span class="trust-badge trust-3 reveal-on-scroll reveal-up">⏱ お気軽にご相談ください</span>
</div>

<div class="container">
  <div class="card tilt-card reveal-on-scroll reveal-up">
    <div class="card-icon-circle lg c-amber">💼</div>
    <div class="error" id="contact-error" style="display:none"></div>
    <div id="contact-success" style="display:none">
      <p>お問い合わせありがとうございました。内容を確認のうえ、担当よりご連絡いたします。</p>
    </div>
    <form id="contact-form">
      <label for="contact-name">お名前・会社名</label>
      <input type="text" id="contact-name">
      <label for="contact-email">ご連絡先メールアドレス</label>
      <input type="text" id="contact-email">
      <label for="contact-message">ご依頼内容</label>
      <textarea id="contact-message" rows="6"></textarea>
      <button type="submit" class="btn">送信する</button>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-grid">
    <a href="/" class="nav-logo footer-brand"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
    <div class="footer-links">
      <a href="/profile">プロフィール</a>
      <a href="/articles">お薬の記事</a>
      <a href="/contact">仕事のご依頼</a>
      <a href="/patient">患者様はこちら</a>
      <a href="/guide">ご利用ガイド</a>
    </div>
  </div>
  <div class="footer-note" data-copyright>© かかりつけ薬剤師</div>
</footer>

<script src="/js/site.js"></script>
<script src="/js/contact.js"></script>
</body>
</html>
