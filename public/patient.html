<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かかりつけ薬剤師 - 患者さま専用ページ</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2F9E8F">
<link rel="icon" href="/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="かかりつけ薬剤師">
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/profile">プロフィール</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">仕事のご依頼</a>
  </div>
</nav>

<div class="container" style="padding-bottom:0;">
  <div class="install-banner" id="install-banner">
    <button type="button" class="install-dismiss" id="install-dismiss" aria-label="閉じる">×</button>
    <div class="install-banner-row">
      <span class="install-icon">📲</span>
      <div class="install-text">
        <strong>ホーム画面に追加</strong>
        <p>アプリのようにワンタップで開けるようになります</p>
      </div>
    </div>
    <button type="button" class="btn install-btn" id="install-btn">追加する</button>
  </div>
  <div class="install-instructions" id="install-instructions">
    <ol>
      <li>画面下（Androidは右上）の<strong>共有ボタン📤</strong>をタップ</li>
      <li>メニューから<strong>「ホーム画面に追加」</strong>を選ぶ</li>
      <li>右上の<strong>「追加」</strong>をタップすれば完了です</li>
    </ol>
  </div>
</div>

<div class="page-header">
  <span class="hero-deco deco-1" aria-hidden="true">💊</span>
  <span class="hero-deco deco-4" aria-hidden="true">✚</span>
  <span class="hero-deco deco-5" aria-hidden="true">🌿</span>
  <h1 class="reveal">💊 かかりつけ薬剤師</h1>
  <p class="reveal delay-1" id="header-sub">患者さま専用ページ</p>
</div>
<div class="page-wave">
  <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,45 350,-5 500,20 L500,40 L0,40 Z" fill="#F4F6F5"></path>
  </svg>
</div>

<div class="container" id="app-container">

  <section id="login-section" style="display:none">
    <div class="card tilt-card reveal-on-scroll reveal-up">
      <div class="card-icon-circle lg c-teal">🔑</div>
      <h3>認証コードを入力してください</h3>
      <div class="error" id="login-error" style="display:none"></div>
      <label for="name-input">お名前</label>
      <input type="text" id="name-input" placeholder="例：田中 太郎">
      <label for="passcode-input">認証コード</label>
      <input type="password" id="passcode-input" placeholder="担当薬剤師から伝えられたコード">
      <button class="btn" id="verify-button">送信</button>
    </div>
  </section>

  <section id="consent-section" style="display:none">
    <div class="card tilt-card reveal-on-scroll reveal-up">
      <h3>ご利用にあたって</h3>
      <div class="policy-text" id="policy-text"></div>
      <div class="consent-buttons">
        <button class="btn" id="agree-button">同意する</button>
        <button class="btn btn-secondary" id="disagree-button">同意しない</button>
      </div>
    </div>
  </section>

  <section id="chat-section" style="display:none">
    <div style="display:flex; justify-content:flex-end; align-items:center; gap:14px; margin-bottom:8px;">
      <button type="button" id="video-call-button" style="font-size:13px; color:var(--muted); background:none; border:none; padding:0; cursor:pointer;">📹 ビデオ通話で相談する</button>
      <a href="/medications" style="font-size:13px; color:var(--muted);">📋 お薬手帳を見る</a>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-input-row">
        <label class="file-btn" for="image-input">📷</label>
        <input type="file" id="image-input" accept="image/*">
        <input type="text" id="message-input" placeholder="お薬について相談する">
        <button id="send-button">送信</button>
      </div>
    </div>
    <div class="footer-note" id="image-filename"></div>
  </section>

</div>

<footer class="site-footer">
  <div class="footer-grid">
    <a href="/" class="nav-logo footer-brand"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
    <div class="footer-links">
      <a href="/profile">プロフィール</a>
      <a href="/articles">お薬の記事</a>
      <a href="/contact">仕事のご依頼</a>
    </div>
  </div>
  <div class="footer-note" data-copyright>© かかりつけ薬剤師</div>
</footer>

<script src="/js/site.js"></script>
<script src="/js/patient-chat.js"></script>
</body>
</html>
