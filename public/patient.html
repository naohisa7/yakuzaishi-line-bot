<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かかりつけ薬剤師 - 患者さま専用ページ</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-logo"><span class="nav-logo-icon">💊</span> かかりつけ薬剤師</a>
  <div class="nav-links">
    <a href="/profile">プロフィール</a>
    <a href="/articles">お薬の記事</a>
    <a href="/contact">仕事のご依頼</a>
  </div>
</nav>

<div class="page-header">
  <span class="hero-deco deco-1" aria-hidden="true">💊</span>
  <span class="hero-deco deco-4" aria-hidden="true">✚</span>
  <span class="hero-deco deco-5" aria-hidden="true">🌿</span>
  <h1 class="reveal">💊 かかりつけ薬剤師</h1>
  <p class="reveal delay-1" id="header-sub">患者さま専用ページ</p>
</div>
<div class="page-wave">
  <svg viewBox="0 0 500 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,45 350,-5 500,20 L500,40 L0,40 Z" fill="#F4F6F5"></path>
  </svg>
</div>

<div class="container" id="app-container">

  <section id="login-section" style="display:none">
    <div class="card tilt-card reveal-on-scroll reveal-up">
      <div class="card-icon-circle lg c-teal">🔑</div>
      <h3>認証コードを入力してください</h3>
      <div class="error" id="login-error" style="display:none"></div>
      <label for="name-input">お名前</label>
      <input type="text" id="name-input" placeholder="例：田中 太郎">
      <label for="passcode-input">認証コード</label>
      <input type="password" id="passcode-input" placeholder="担当薬剤師から伝えられたコード">
      <button class="btn" id="verify-button">送信</button>
    </div>
  </section>

  <section id="consent-section" style="display:none">
    <div class="card tilt-card reveal-on-scroll reveal-up">
      <h3>ご利用にあたって</h3>
      <div class="policy-text" id="policy-text"></div>
      <div class="consent-buttons">
        <button class="btn" id="agree-button">同意する</button>
        <button class="btn btn-secondary" id="disagree-button">同意しない</button>
      </div>
    </div>
  </section>

  <section id="chat-section" style="display:none">
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-input-row">
        <label class="file-btn" for="image-input">📷</label>
        <input type="file" id="image-input" accept="image/*">
        <input type="text" id="message-input" placeholder="お薬について相談する">
        <button id="send-button">送信</button>
      </div>
    </div>
    <div class="footer-note" id="image-filename"></div>
  </section>

</div>

<script src="/js/site.js"></script>
<script src="/js/patient-chat.js"></script>
</body>
</html>
